<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eaglercraft 1.20.4</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: url("assets/img/loading screen.jpg") center/cover no-repeat;
    }
    #game-frame {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .menu-button {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      padding: 12px;
      margin: 8px 0;
      background: #6b6b6b;
      border: 3px solid #000;
      color: #fff;
      font-family: "Courier New", monospace;
      font-size: 18px;
      text-align: center;
      cursor: pointer;
    }
    .menu-button:hover {
      background: #7FFF7F;
      color: #000;
    }
  </style>
</head>
<body>
  <div id="game-frame">
    <div class="menu-button" style="top: 40%;">Singleplayer</div>
    <div class="menu-button" style="top: 48%;">Multiplayer</div>
    <div class="menu-button" style="top: 56%;">Mods</div>
    <div class="menu-button" style="top: 64%;">Options</div>
    <div class="menu-button" style="top: 72%;">Quit Game</div>
  </div>
  <script src="main.js"></script>
</body>
</html>
